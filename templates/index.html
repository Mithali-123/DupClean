<!DOCTYPE html>
<html>
<head>
    <title>DupClean Pro</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>DupClean 🧹</h1>
        <button onclick="pickFolder()">Step 1: Select Folder</button>
        <div id="out" style="margin-top: 20px;"></div>
    </div>

    <script>
        function pickFolder() {
            fetch('/open_dialog', {method: 'POST'})
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    document.getElementById('out').innerText = "Selected: " + data.path;
                    // Trigger scan automatically
                    fetch('/scan').then(r => r.json()).then(d => {
                        document.getElementById('out').innerHTML += "<br>Found " + d.files.length + " files.";
                    });
                }
            });
        }
    </script>
</body>
</html>
