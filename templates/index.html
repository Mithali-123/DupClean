<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DupClean | Smart Utility</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        .btn { background: #6f42c1; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #5a32a3; }
        #log { margin-top: 20px; text-align: left; font-size: 0.9em; color: #333; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h1>DupClean 🧹</h1>
        <p>Clean your storage by identifying duplicates.</p>
        
        <input type="file" id="folderPicker" webkitdirectory directory multiple style="display: none;">
        <button class="btn" onclick="document.getElementById('folderPicker').click()">Select Folder & Scan</button>
        
        <div id="log">Ready...</div>
    </div>

    <script>
        document.getElementById('folderPicker').addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length > 0) {
                // In modern browsers, we can't get the full disk path for security, 
                // but we can process the file objects directly or use the folder name.
                const folderName = files[0].webkitRelativePath.split('/')[0];
                document.getElementById('log').innerHTML = "<b>Scanning:</b> " + folderName;
                
                // Example of sending the intent to the backend
                fetch('/scan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ path: folderName })
                })
                .then(res => res.json())
                .then(data => {
                    document.getElementById('log').innerHTML += "<br>" + data.message;
                });
            }
        });
    </script>
</body>
</html>
